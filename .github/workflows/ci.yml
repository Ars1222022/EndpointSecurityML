name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Create directories
        run: |
          mkdir -p data/raw
          mkdir -p models/production
          
      - name: Create test model
        run: |
          python -c '
          import pandas as pd
          import numpy as np
          from sklearn.ensemble import RandomForestClassifier
          import joblib
          import os
          from datetime import datetime

          print("Skapar testmodell...")
          X_train = np.array([[0,0], [1,1], [0,0], [1,1]])
          y_train = np.array([0,1,0,1])

          model = RandomForestClassifier(n_estimators=10)
          model.fit(X_train, y_train)

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          model_path = f"models/production/endpoint_model_{timestamp}.pkl"
          joblib.dump(model, model_path)
          print(f"Testmodell sparad: {model_path}")

          # Visa absolut sökväg
          import os
          print(f"Absolut sökväg: {os.path.abspath(model_path)}")
          '
          
      - name: Debug - List all files
        run: |
          echo "=== models/production ==="
          ls -la models/production/
          echo "=== Current directory ==="
          pwd
          echo "=== Full tree ==="
          find . -type f -name "*.pkl" | head -20
          
      - name: Run tests
        run: pytest tests/ -v -s