name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
          
      - name: Create directories
        run: |
          mkdir -p data/raw
          mkdir -p models/production
          
      - name: Create test model
        run: |
          python -c '
          import pandas as pd
          import numpy as np
          from sklearn.ensemble import RandomForestClassifier
          import joblib
          import os
          from datetime import datetime

          print("=" * 50)
          print("SKAPAR TESTMODELL")
          print("=" * 50)

          X_train = np.array([[0,0], [1,1], [0,0], [1,1]])
          y_train = np.array([0,1,0,1])
          model = RandomForestClassifier(n_estimators=10)
          model.fit(X_train, y_train)

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          model_path = f"models/production/endpoint_model_{timestamp}.pkl"
          joblib.dump(model, model_path)

          print(f"✓ Modell sparad: {model_path}")
          print(f"✓ Absolut sökväg: {os.path.abspath(model_path)}")
          print(f"✓ Finns filen? {os.path.exists(model_path)}")
          '
          
      - name: Debug - List all model files
        run: |
          echo "=== ALLA .pkl FILER ==="
          find . -name "*.pkl" -type f | xargs ls -la
          
      - name: Debug - Test API direkt
        run: |
          # Starta API i bakgrunden
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          
          # Vänta på att API startar
          sleep 5
          
          # Testa health endpoint
          echo "=== TESTAR HEALTH ENDPOINT ==="
          curl -f http://localhost:8000/health || echo "Health endpoint failed"
          
          # Visa API-loggar
          echo "=== API LOGGAR ==="
          kill -0 $API_PID 2>/dev/null && echo "API körs" || echo "API är stoppat"
          
      - name: Run tests
        run: pytest tests/ -v