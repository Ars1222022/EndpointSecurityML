name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install psutil
          
      - name: Create directories
        run: |
          mkdir -p data/raw
          mkdir -p models/production
          
      - name: Create test model
        run: |
          python -c '
          import pandas as pd
          import numpy as np
          from sklearn.ensemble import RandomForestClassifier
          import joblib
          import os
          from datetime import datetime

          X_train = np.array([[0,0], [1,1], [0,0], [1,1]])
          y_train = np.array([0,1,0,1])
          model = RandomForestClassifier(n_estimators=10, random_state=42)
          model.fit(X_train, y_train)

          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          model_path = f"models/production/endpoint_model_{timestamp}.pkl"
          joblib.dump(model, model_path)
          print(f"Modell sparad: {model_path}")
          '
          
      - name: Start API with debug
        run: |
          echo "Starting API..."
          uvicorn src.api.app_ci:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          echo "API PID: $API_PID"
          
          echo "Waiting 5 seconds..."
          sleep 5
          
          echo "Checking if process is running..."
          ps aux | grep uvicorn
          
          echo "Testing health endpoint..."
          curl -v http://localhost:8000/health || echo "Health endpoint failed"
          
          echo "Checking if process is still alive..."
          kill -0 $API_PID 2>/dev/null && echo "✅ API is running" || echo "❌ API crashed"
          
          if ! kill -0 $API_PID 2>/dev/null; then
            echo "API crashed - showing last 50 lines of nohup.out:"
            tail -50 nohup.out 2>/dev/null || echo "No nohup.out file"
          fi
          
      - name: Test health endpoint
        run: curl -f http://localhost:8000/health || exit 1
          
      - name: Run tests
        run: pytest tests/ -v